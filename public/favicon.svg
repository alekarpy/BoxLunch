    <path d="M2 2 L6 6 C7 7, 7.5 5.5, 5.5 3.5 C4.5 2.5, 2.5 1.5, 2.5 1.5" />
    <path d="M1.5 2.5 C2.5 4.5, 3.5 6.5, 5.5 5.5 C7.5 4.5, 7 3, 6 2" />
